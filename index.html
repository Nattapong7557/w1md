/* Google Fonts Imports */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap');

/* CSS Custom Properties (Theme Variables) */
:root {
    /* Dark Theme Variables (Default) */
    --bg-primary: #0a0d16;
    --bg-secondary: #111625;
    --bg-glass: rgba(17, 22, 37, 0.7);
    --border-glass: rgba(255, 255, 255, 0.08);
    --border-glow: rgba(0, 242, 254, 0.15);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent-blue: #00f2fe;
    --accent-purple: #9d4edd;
    --accent-purple-glow: rgba(157, 78, 221, 0.4);
    --accent-emerald: #10b981;
    --accent-gold: #f59e0b;
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.6);
    --glass-blur: 16px;
    --transition-speed: 0.3s;
    --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Light Theme Variables */
[data-theme="light"] {
    --bg-primary: #f8fafc;
    --bg-secondary: #ffffff;
    --bg-glass: rgba(255, 255, 255, 0.8);
    --border-glass: rgba(15, 23, 42, 0.08);
    --border-glow: rgba(59, 130, 246, 0.15);
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --accent-purple-glow: rgba(139, 92, 246, 0.2);
    --accent-emerald: #10b981;
    --accent-gold: #d97706;
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.08);
    --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
}

/* Reset and Core Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
    font-size: 16px;
}

body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
    transition: background-color var(--transition-speed), color var(--transition-speed);
}

/* Modern Custom Scrollbar */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: var(--bg-primary);
}

::-webkit-scrollbar-thumb {
    background: var(--bg-secondary);
    border-radius: 4px;
    border: 1px solid var(--border-glass);
}

::-webkit-scrollbar-thumb:hover {
    background: var(--accent-blue);
}

/* Grid Layout for App */
#app-container {
    display: flex;
    width: 100%;
    min-height: 100vh;
    position: relative;
}

/* Sidebar Styling (Obsidian Glassmorphism) */
aside.sidebar {
    width: 320px;
    background: var(--bg-glass);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border-right: 1px solid var(--border-glass);
    height: 100vh;
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
    z-index: 100;
    padding: 2rem 1.5rem;
    transition: width var(--transition-speed), transform var(--transition-speed);
}

.sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
}

.sidebar-logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.sidebar-logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.25rem;
    box-shadow: 0 4px 15px var(--accent-purple-glow);
}

.sidebar-logo-text {
    font-family: 'Outfit', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    background: linear-gradient(to right, var(--text-primary), var(--text-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Theme Toggle Button */
.theme-toggle-btn {
    background: var(--bg-secondary);
    border: 1px solid var(--border-glass);
    border-radius: 10px;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all var(--transition-speed) var(--transition-bounce);
}

.theme-toggle-btn:hover {
    color: var(--accent-blue);
    border-color: var(--accent-blue);
    transform: scale(1.05);
    box-shadow: 0 0 10px var(--border-glow);
}

/* Sidebar Navigation & Table of Contents */
.sidebar-nav {

    overflow-y: auto;
    padding-right: 0.25rem;
}

.toc-title {

    font-size: 0.8rem;

}

.toc-list {

.toc-item {

.toc-link:hover {

.toc-item.active .toc-link {

.markdown-body h2 {

}

.markdown-body h2::after {

# เอกสารข้อกำหนดความต้องการทางซอฟต์แวร์ (Software Requirements Specification - SRS)
## โปรเจกต์: ระบบร้านขายรูปภาพศิลปะออนไลน์ (Art Gallery Platform)
**จัดทำโดย:** นัธทวัฒน์ ปิ่นปั่น, กษิดิ์เดช เนียมทอง, ณัฐพงศ์ จุลละลุจิ, ธนชล แจงเจริญ

---

## 1. ภาพรวมระบบ (System Overview)
ระบบร้านขายรูปภาพศิลปะออนไลน์ (Art Gallery Platform) เป็นแพลตฟอร์มที่เชื่อมต่อระหว่าง **ศิลปิน (Artists)** ผู้สร้างสรรค์ผลงาน และ **ลูกค้า (Customers)** ผู้ต้องการสั่งซื้อรูปภาพในรูปแบบดิจิทัลและการพิมพ์ (Print on Demand)

ระบบนี้รองรับการแสดงผลงานแบบ Mobile-First โดยทำงานอยู่บนระบบ Frontend ด้วย React / Next.js ที่ทำ Server-Side Rendering (SSR) และมี Backend เป็น Node.js/Express สำหรับจัดการส่วนของ Business Logic พร้อมทั้งใช้ AWS S3 สำหรับจัดเก็บไฟล์ต้นฉบับคุณภาพสูง (High-Resolution) และจัดทำไฟล์ลายน้ำ (Watermarked Previews) เพื่อป้องกันการละเมิดลิขสิทธิ์

---

## 2. ความต้องการทางระบบ (System Requirements)

### 2.1 ความต้องการเชิงฟังก์ชัน (Functional Requirements)

#### ก. ฝั่งลูกค้า (Customer Portal)
- **การเลือกดูผลงาน (Browse Artwork):** ค้นหาและคัดกรองรูปภาพตามหมวดหมู่ ชื่อศิลปิน สไตล์ แท็ก สีหลัก หรือช่วงราคา
- **โปรไฟล์ศิลปิน (Artist Profile):** เข้าดูผลงานทั้งหมด ประวัติ (Bio) และช่องทางการติดต่อของศิลปิน
- **รายละเอียดผลงาน (Artwork Detail):** ดูรายละเอียดรูปภาพ ซูมภาพตัวอย่าง (Watermarked) เลือกขนาดพิมพ์ (Print Size) และประเภทกรอบรูป (Framing Option)
- **ตะกร้าสินค้าและการชำระเงิน (Cart & Checkout):** บันทึกรายการที่ต้องการซื้อ คำนวณราคาค่าพิมพ์ กรอบรูป และค่าจัดส่ง
- **การจัดการสมาชิก (Auth):** สมัครสมาชิก เข้าสู่ระบบด้วย JWT หรือ OAuth2 (Google) รวมถึงบันทึกรายการโปรด (Wishlist) และดูประวัติการสั่งซื้อ (Order History)

#### ข. ฝั่งศิลปินและผู้ดูแลระบบ (Artist / Admin Dashboard)
- **การอัปโหลดผลงาน (Upload Artwork):** ศิลปินสามารถอัปโหลดไฟล์ภาพความละเอียดสูง (High-res) โดยระบบจะส่งไปประมวลผลเพิ่มลายน้ำโดยอัตโนมัติบน AWS S3
- **การจัดการผลงาน (Manage Portfolio):** แก้ไขข้อมูลภาพ ตั้งราคาขายดิจิทัลและราคาเริ่มต้นงานพิมพ์
- **การจัดการคำสั่งซื้อ (Order Fulfillment):** ติดตามสถานะการพิมพ์ การเข้ากรอบรูป และการจัดส่งสินค้าให้กับลูกค้า
- **รายงานสรุปยอดขาย (Sales Dashboard):** สรุปรายได้ สถิติยอดขายผลงานแต่ละชิ้น และจำนวนยอดเข้าชม

---

### 2.2 ความต้องการที่ไม่ได้ทำเชิงฟังก์ชัน (Non-Functional Requirements)
- **ความปลอดภัย (Security):**
  - ใช้ HTTPS ตลอดทั้งระบบ
  - จัดการสิทธิ์การใช้งาน API ด้วย JWT (JSON Web Token) และควบคุม Rate Limiting เพื่อป้องกันการโจมตีแบบ DDoS
  - ปกป้องรูปภาพลิขสิทธิ์ต้นฉบับบน AWS S3 ด้วย Pre-signed URLs ที่หมดอายุได้ และเผยแพร่เฉพาะรูปภาพที่มีลายน้ำ (Watermark) ต่อสาธารณะ
- **ความสามารถในการปรับขยาย (Scalability):**
  - จัดเก็บ Session และแคชผลงานยอดนิยมด้วย Redis เพื่อลด Load การทำงานของ MySQL Database
  - ใช้ NoSQL (MongoDB) สำหรับเก็บข้อมูลการรีวิว (Reviews) และแท็ก (Tags) ที่มีโครงสร้างยืดหยุ่นและต้องการความรวดเร็วในการค้นหา
- **ความน่าเชื่อถือและความพร้อมใช้งาน (Reliability & Availability):**
  - ระบบทำ Containerization ด้วย Docker เพื่อให้ย้ายและขยายขนาดของแอปพลิเคชันได้ง่าย
  - ติดตั้งผ่าน GitHub Actions และรันในสภาพแวดล้อมระบบคลาวด์ (AWS EC2 / Elastic Beanstalk)

### 3.1 Relational Database Schema (MySQL)
ฐานข้อมูลหลักเก็บข้อมูลที่มีความสัมพันธ์กันสูงและต้องการความถูกต้องของธุรกรรม (ACID Transactions) เช่น ข้อมูลผู้ใช้, ข้อมูลทางการเงิน และยอดการสั่งซื้อ

#### ตาราง `users`
| Field | Type | Attributes | Description |
|---|---|---|---|
| `id` | INT | PRIMARY KEY, AUTO_INCREMENT | รหัสผู้ใช้งาน |
| `name` | VARCHAR(100) | NOT NULL | ชื่อ-นามสกุล |
| `email` | VARCHAR(100) | UNIQUE, NOT NULL | อีเมล (ใช้สำหรับ Login) |
| `password_hash` | VARCHAR(255) | NOT NULL | รหัสผ่านที่แฮชแล้ว |
| `role` | ENUM('customer', 'artist', 'admin') | DEFAULT 'customer' | บทบาทของผู้ใช้ |
| `created_at` | TIMESTAMP | DEFAULT CURRENT_TIMESTAMP | วันที่สร้างบัญชี |

#### ตาราง `artworks`
| Field | Type | Attributes | Description |
|---|---|---|---|
| `id` | INT | PRIMARY KEY, AUTO_INCREMENT | รหัสผลงานศิลปะ |
| `artist_id` | INT | FOREIGN KEY (references `artists.id`) | รหัสศิลปินผู้สร้างสรรค์ |
| `title` | VARCHAR(200) | NOT NULL | ชื่อของผลงาน |
| `description` | TEXT | | รายละเอียดคำอธิบายภาพ |
| `high_res_url` | VARCHAR(500) | NOT NULL | ลิงก์ไฟล์ต้นฉบับบน AWS S3 (Private) |
| `preview_url` | VARCHAR(500) | NOT NULL | ลิงก์ไฟล์ตัวอย่างที่มีลายน้ำ (Public) |
| `price_digital` | DECIMAL(10, 2) | NOT NULL | ราคาสำหรับดาวน์โหลดไฟล์ดิจิทัล |
| `created_at` | TIMESTAMP | DEFAULT CURRENT_TIMESTAMP | วันที่อัปโหลดรูปภาพ |

### 3.3 Cache Store (Redis)
ใช้เก็บข้อมูลประเภท Session และเก็บ Cache ผลงานยอดนิยมชั่วคราวเพื่อเร่งความเร็วในการโหลดหน้าเว็บหลัก

- **Key:** `session:<user_id>`
  - **Type:** String (JSON)
  - **Value:** ข้อมูลเซสชันการเข้าสู่ระบบและโทเค็นของระบบ
- **Key:** `artwork:detail:<artwork_id>`
  - **Type:** String (JSON)
  - **Value:** แคชรายละเอียดผลงานเพื่อลดการคิวรี่ MySQL ซ้ำๆ

    </script>

    <!-- Application Script (Embedded) -->
    <script>
document.addEventListener('DOMContentLoaded', () => {
    const markdownContainer = document.getElementById('markdown-content');
    const tocList = document.getElementById('toc-list');
    const themeToggleBtn = document.getElementById('theme-toggle');
    const mobileNavToggle = document.getElementById('mobile-nav-toggle');
    const sidebar = document.querySelector('aside.sidebar');
    const contentArea = document.querySelector('main.content-area');
    const scrollTopBtn = document.getElementById('scroll-top-btn');

    let currentTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', currentTheme);
    updateThemeIcon();

    // Initialize Mermaid Configuration
    initMermaid(currentTheme);

    // Fetch and Render Markdown Documentation
    fetchDocumentation();

    // Event Listeners
    themeToggleBtn.addEventListener('click', toggleTheme);
    if (mobileNavToggle) {
        mobileNavToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            const isOpen = sidebar.classList.contains('open');
            mobileNavToggle.innerHTML = isOpen ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
        });
    }

    // Scroll Top Button Handler
    if (scrollTopBtn) {
        scrollTopBtn.addEventListener('click', () => {
            contentArea.scrollTo({ top: 0, behavior: 'smooth' });
        });
        
        contentArea.addEventListener('scroll', () => {
            if (contentArea.scrollTop > 300) {
                scrollTopBtn.style.opacity = '1';
                scrollTopBtn.style.pointerEvents = 'all';
            } else {
                scrollTopBtn.style.opacity = '0';
                scrollTopBtn.style.pointerEvents = 'none';
            }
        });
    }

    // Functions
    function initMermaid(theme) {
        mermaid.initialize({
            startOnLoad: false,
            theme: theme === 'dark' ? 'dark' : 'default',
            securityLevel: 'loose',
            flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'cardinal' },
            gantt: { useWidth: 1200 },
            themeVariables: theme === 'dark' ? {
                background: 'transparent',
                primaryColor: '#111625',
                primaryTextColor: '#f1f5f9',
                lineColor: '#64748b',
                secondaryColor: '#1b253b',
                tertiaryColor: '#2d1b4e'
            } : {
                background: 'transparent',
                primaryColor: '#ffffff',
                primaryTextColor: '#0f172a',
                lineColor: '#94a3b8',
                secondaryColor: '#f8fafc',
                tertiaryColor: '#f1f5f9'
            }
        });
    }

    async function fetchDocumentation() {
        try {
            // Try fetching dynamically (works on local servers / hosting)
            const response = await fetch('srs.md');
            if (!response.ok) {
                throw new Error(`Failed to load srs.md (Status: ${response.status})`);
            }
            const markdownText = await response.text();
            renderMarkdown(markdownText);
        } catch (error) {
            console.warn('Dynamic fetch failed (possibly local file protocol CORS). Using embedded fallback markdown...', error);
            const fallbackElement = document.getElementById('srs-fallback-markdown');
            if (fallbackElement) {
                renderMarkdown(fallbackElement.textContent);
            } else {
                console.error('Error fetching documentation:', error);
                markdownContainer.innerHTML = `
                    <div style="padding: 2rem; border-radius: 12px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #ef4444;">
                        <h3><i class="fas fa-exclamation-triangle"></i> Error Loading Documentation</h3>
                        <p>${error.message}</p>
                        <p style="margin-top: 1rem; font-size: 0.9rem; color: var(--text-secondary);">
                            Please verify that <strong>srs.md</strong> exists or that the embedded backup is loaded correctly.
                        </p>
                    </div>
                `;
            }
        }
    }

    function renderMarkdown(text) {
        // Configure marked options
        marked.setOptions({
            gfm: true,
            breaks: true,
            headerIds: false // We will handle IDs manually to ensure clean routing
        });

        // Parse markdown text to HTML
        const htmlContent = marked.parse(text);
        markdownContainer.innerHTML = htmlContent;

        // Custom post-processing for Mermaid block renderings
        processMermaidBlocks();

        // Build Table of Contents & setup headers
        buildTableOfContents();

        // Initialize and render all Mermaid diagrams on screen
        try {
            mermaid.init(undefined, document.querySelectorAll('.mermaid'));
        } catch (e) {
            console.error('Mermaid render error:', e);
        }

        // Setup Scroll Spy
        setupScrollSpy();
    }

    function processMermaidBlocks() {
        // Look for pre code elements that are tagged as language-mermaid
        const codeElements = markdownContainer.querySelectorAll('pre code.language-mermaid');
        codeElements.forEach(codeElement => {
            const preElement = codeElement.parentElement;
            const mermaidCode = codeElement.textContent.trim();
            
            // Create container for mermaid rendering
            const containerDiv = document.createElement('div');
            containerDiv.className = 'mermaid-diagram-container';
            
            const mermaidDiv = document.createElement('div');
            mermaidDiv.className = 'mermaid';
            mermaidDiv.textContent = mermaidCode;
            
            containerDiv.appendChild(mermaidDiv);
            preElement.parentNode.replaceChild(containerDiv, preElement);
        });
    }

    function buildTableOfContents() {
        tocList.innerHTML = ''; // Clear original TOC list
        const headers = markdownContainer.querySelectorAll('h1, h2, h3');
        
        headers.forEach((header, index) => {
            // Generate clean URL slug ID from header text
            const headerText = header.textContent.trim();
            const headerId = 'section-' + index + '-' + headerText
                .toLowerCase()
                .replace(/[^\w\u0e00-\u0e7f\-]+/g, '-') // Allow Thai characters and standard alphanumeric/hyphens
                .replace(/^-+|-+$/g, '');
            
            header.setAttribute('id', headerId);

            // Create TOC list item
            const level = parseInt(header.tagName.substring(1));
            const listItem = document.createElement('li');
            listItem.className = `toc-item level-${level}`;
            
            const anchor = document.createElement('a');
            anchor.href = `#${headerId}`;
            anchor.className = 'toc-link';
            anchor.textContent = headerText;
            
            // Click listener for smooth navigation and closing mobile sidebar
            anchor.addEventListener('click', (e) => {
                e.preventDefault();
                header.scrollIntoView({ behavior: 'smooth' });
                
                // Active TOC item styling update immediately
                document.querySelectorAll('.toc-item').forEach(item => item.classList.remove('active'));
                listItem.classList.add('active');

                // Close mobile sidebar if open
                if (sidebar.classList.contains('open')) {
                    sidebar.classList.remove('open');
                    if (mobileNavToggle) {
                        mobileNavToggle.innerHTML = '<i class="fas fa-bars"></i>';
                    }
                }
            });

            listItem.appendChild(anchor);
            tocList.appendChild(listItem);
        });
    }

    function setupScrollSpy() {
        const headers = Array.from(markdownContainer.querySelectorAll('h1, h2, h3'));
        const tocItems = Array.from(tocList.querySelectorAll('.toc-item'));

        if (headers.length === 0) return;

        function updateActiveHeader() {
            const scrollContainerTop = contentArea.getBoundingClientRect().top;
            let activeIndex = 0;

            // Find current header in view
            for (let i = 0; i < headers.length; i++) {
                const headerRect = headers[i].getBoundingClientRect();
                // If header is above the center of viewport, select it
                if (headerRect.top - scrollContainerTop <= 120) {
                    activeIndex = i;
                } else {
                    break;
                }
            }

            // Remove active classes
            tocItems.forEach(item => item.classList.remove('active'));
            
            // Add active class to current header's TOC item
            if (tocItems[activeIndex]) {
                tocItems[activeIndex].classList.add('active');
                
                // Auto scroll TOC to keep the active item visible
                const activeItem = tocItems[activeIndex];
                const navContainer = tocList.parentElement;
                const activeRect = activeItem.getBoundingClientRect();
                const containerRect = navContainer.getBoundingClientRect();

                if (activeRect.top < containerRect.top) {
                    navContainer.scrollTop -= (containerRect.top - activeRect.top + 10);
                } else if (activeRect.bottom > containerRect.bottom) {
                    navContainer.scrollTop += (activeRect.bottom - containerRect.bottom + 10);
                }
            }
        }

        // Run once initially and bind scroll listener
        updateActiveHeader();
        contentArea.addEventListener('scroll', updateActiveHeader);
    }

    function toggleTheme() {
        currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', currentTheme);
        localStorage.setItem('theme', currentTheme);
        updateThemeIcon();
        
        // Re-initialize mermaid and reload document to render diagrams correctly in new theme colors
        initMermaid(currentTheme);
        fetchDocumentation();
    }

    function updateThemeIcon() {
        themeToggleBtn.innerHTML = currentTheme === 'dark' 
            ? '<i class="fas fa-sun"></i>' 
            : '<i class="fas fa-moon"></i>';
    }
});
</script>
